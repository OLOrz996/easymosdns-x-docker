name: Publish easymosdns-x Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: olorz/easymosdns-x-docker
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Read Docker Hub short description
        id: dockerhub_short
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          {
            echo 'value<<EOF'
            cat dockerhub/short-description.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Update Docker Hub description
        id: dockerhub_description
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: olorz/easymosdns-x-docker
          short-description: ${{ steps.dockerhub_short.outputs.value }}
          readme-filepath: ./README.md
          enable-url-completion: true

      - name: Summarize Docker publish result
        if: always()
        run: |
          {
            echo "## Docker publish summary"
            echo ""
            if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
              echo "- Release ref: ${{ github.ref_name }}"
              echo "- Image push: success"
              if [ "${{ steps.dockerhub_description.outcome }}" = "success" ]; then
                echo "- Docker Hub description sync: success"
              else
                echo "- Docker Hub description sync: failed"
                echo ""
                echo "The image was pushed successfully, but Docker Hub short description/overview was not updated."
                echo "Check the 'Update Docker Hub description' step for the exact error."
              fi
            else
              echo "- Validation build: success"
              echo "- Docker Hub push: skipped"
              echo "- Docker Hub description sync: skipped"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if Docker Hub description sync failed
        if: startsWith(github.ref, 'refs/tags/v') && steps.dockerhub_description.outcome != 'success'
        run: |
          echo "Docker image push succeeded, but Docker Hub description sync failed." >&2
          echo "Check the 'Update Docker Hub description' step for details." >&2
          exit 1
