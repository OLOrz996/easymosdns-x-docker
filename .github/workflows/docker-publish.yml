name: Build and Publish easymosdns-x Docker Image

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish even if the combined version tag already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: olorz/easymosdns-x-docker

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.versions.outputs.image_version }}
      mosdns_x_ref: ${{ steps.versions.outputs.mosdns_x_ref }}
      easymosdns_ref: ${{ steps.versions.outputs.easymosdns_ref }}
      combined_version: ${{ steps.versions.outputs.combined_version }}
      should_publish: ${{ steps.gate.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version matrix
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          image_version="$(tr -d '\r\n' < IMAGE_VERSION)"
          mosdns_x_ref="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              https://api.github.com/repos/pmkol/mosdns-x/releases/latest |
            sed -n 's/.*"tag_name":[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1
          )"
          easymosdns_ref="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              https://api.github.com/repos/pmkol/easymosdns/releases/latest |
            sed -n 's/.*"tag_name":[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1
          )"

          if [[ -z "${image_version}" || -z "${mosdns_x_ref}" || -z "${easymosdns_ref}" ]]; then
            echo "Failed to resolve one or more versions." >&2
            exit 1
          fi

          combined_version="${image_version}--${mosdns_x_ref}--${easymosdns_ref}"

          {
            echo "image_version=${image_version}"
            echo "mosdns_x_ref=${mosdns_x_ref}"
            echo "easymosdns_ref=${easymosdns_ref}"
            echo "combined_version=${combined_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name != 'push'
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to publish
        id: gate
        env:
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish || 'false' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${FORCE_PUBLISH}" == "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.versions.outputs.combined_version }}" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  docker:
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: needs.resolve.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build validation image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            MOSDNS_X_REF=${{ needs.resolve.outputs.mosdns_x_ref }}
            EASYMOSDNS_REF=${{ needs.resolve.outputs.easymosdns_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push release image
        if: github.event_name != 'push' && needs.resolve.outputs.should_publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            MOSDNS_X_REF=${{ needs.resolve.outputs.mosdns_x_ref }}
            EASYMOSDNS_REF=${{ needs.resolve.outputs.easymosdns_ref }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.resolve.outputs.combined_version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=easymosdns-x Docker
            org.opencontainers.image.version=${{ needs.resolve.outputs.combined_version }}
            org.opencontainers.image.description=Bundled mosdns-x and easymosdns template image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Read Docker Hub short description
        id: dockerhub_short
        if: github.event_name != 'push' && needs.resolve.outputs.should_publish == 'true'
        run: |
          {
            echo 'value<<EOF'
            cat dockerhub/short-description.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Update Docker Hub description
        id: dockerhub_description
        if: github.event_name != 'push' && needs.resolve.outputs.should_publish == 'true'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: olorz/easymosdns-x-docker
          short-description: ${{ steps.dockerhub_short.outputs.value }}
          readme-filepath: ./README.md
          enable-url-completion: true

      - name: Summarize result
        if: always()
        run: |
          {
            echo "## Docker publish summary"
            echo ""
            echo "- Image version: ${{ needs.resolve.outputs.image_version }}"
            echo "- mosdns-x version: ${{ needs.resolve.outputs.mosdns_x_ref }}"
            echo "- easymosdns version: ${{ needs.resolve.outputs.easymosdns_ref }}"
            echo "- Combined image tag: ${{ needs.resolve.outputs.combined_version }}"
            if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              echo "- Validation build: success"
              echo "- Docker Hub push: skipped"
            elif [[ "${{ needs.resolve.outputs.should_publish }}" == "true" ]]; then
              echo "- Docker Hub push: success"
              if [[ "${{ steps.dockerhub_description.outcome }}" == "success" ]]; then
                echo "- Docker Hub description sync: success"
              else
                echo "- Docker Hub description sync: failed"
              fi
            else
              echo "- Docker Hub push: skipped"
              echo "- Reason: this combined version tag already exists"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if Docker Hub description sync failed
        if: github.event_name != 'push' && needs.resolve.outputs.should_publish == 'true' && steps.dockerhub_description.outcome != 'success'
        run: |
          echo "Docker image push succeeded, but Docker Hub description sync failed." >&2
          echo "Check the 'Update Docker Hub description' step for details." >&2
          exit 1
